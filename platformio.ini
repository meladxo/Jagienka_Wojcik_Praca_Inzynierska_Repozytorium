; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = T-A7670X

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = 
	https://github.com/PaulStoffregen/OneWire.git#v2.3.8
	milesburton/DallasTemperature@^4.0.5
	https://github.com/lewisxhe/TinyGSM-fork
	bblanchon/ArduinoJson@^7.4.2
	https://github.com/taranais/NTPClient.git
	northernwidget/DS3231@^1.2.0
	jchristensen/Timezone@^1.2.6

[esp32dev_base]
board = esp32dev
build_flags = 
	${env.build_flags}
	-mfix-esp32-psram-cache-issue
	-DBOARD_HAS_PSRAM
monitor_filters = 
	default
	esp32_exception_decoder
	default
	log2file
monitor_speed = 115200

[env:T-A7670X]
extends = esp32dev_base
framework = arduino
platform = espressif32
build_flags = ${esp32dev_base.build_flags}
	-DLILYGO_T_A7670
lib_deps = 
	https://github.com/PaulStoffregen/OneWire.git#v2.3.8
	milesburton/DallasTemperature@^4.0.5
	https://github.com/lewisxhe/TinyGSM-fork
	bblanchon/ArduinoJson@^7.4.2
	https://github.com/taranais/NTPClient.git
	northernwidget/DS3231@^1.2.0
	jchristensen/Timezone@^1.2.6

[SIMCOM_STANDARD]
build_flags = 
	-DLILYGO_SIMCOM_STANDARD_PIN
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DCORE_DEBUG_LEVEL=0
monitor_filters = 
	time
	default
	esp32_exception_decoder